<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">

<body style="background-color:white;">
    <div class="page">
        
        <h1 style="margin-top: 0px; color: rgb(137, 52, 20);">Orange</h1>

        <div class="playlist">
            <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/3aD2DXwVlBHQDyyah5DzhH?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>


        <br>

        <p>Don't use spotify?</p>
        <div class="row">
            <button style='display:inline' id="apple" onclick="window.open('https://music.apple.com/us/playlist/2000s-dance-party-essentials/pl.9c6636d6f4474a92b706c414fb6411ed', '_blank')">Apple Music</button>
            <button style='display:inline' id="youtube" onclick="window.open('https://www.youtube.com/watch?v=aNSiNYb4c9c', '_blank')">Youtube</button>
            <button style='display:inline' id="amazon" onclick="window.open('https://music.amazon.com/user-playlists/2e8a6faf46fa4107b26a1b2e126604cbsune', '_blank')">Amazon</button>
        </div>
        
        
        
    </div>
    <script src="script.js"></script>

</html>
